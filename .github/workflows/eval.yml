name: Skill Evals

on:
  pull_request:
    paths:
      - "jira/SKILL.md"
      - "jira/evals/**"
  push:
    branches: [main]
    paths:
      - "jira/SKILL.md"
      - "jira/evals/**"

jobs:
  structural:
    name: Structural validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate eval JSON and count cases
        run: |
          # Validate evals.json — checks required fields and non-empty expectations
          INVALID_EVALS=$(jq '[.evals[] | select(.id == null or .prompt == null or .expectations == null or (.expectations | length) == 0)] | length' jira/evals/evals.json)
          if [ "$INVALID_EVALS" -gt 0 ]; then
            echo "::error::$INVALID_EVALS eval(s) missing required fields or have empty expectations:"
            jq -r '.evals[] | select(.id == null or .prompt == null or .expectations == null or (.expectations | length) == 0) | "  eval #\(.id // "?")"' jira/evals/evals.json
            exit 1
          fi

          # Validate trigger-evals.json — checks required fields
          INVALID_TRIGGERS=$(jq '[.[] | select(.query == null or .should_trigger == null)] | length' jira/evals/trigger-evals.json)
          if [ "$INVALID_TRIGGERS" -gt 0 ]; then
            echo "::error::$INVALID_TRIGGERS trigger(s) missing required fields"
            exit 1
          fi

          # Summary
          jq -r '"Task evals: \(.evals | length)"' jira/evals/evals.json
          jq -r '"Trigger evals: \(length) (\(map(select(.should_trigger)) | length) true, \(map(select(.should_trigger | not)) | length) false)"' jira/evals/trigger-evals.json
          echo "All valid."
